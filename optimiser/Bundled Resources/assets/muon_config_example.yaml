# Muon optimizer example config
optimizer:
  name: muon
  lr: 1e-4
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  muon_norm_clip: 1.0
  use_adaptive_norm: true

schedule:
  type: cosine
  warmup_steps: 10000
  total_steps: 200000

training:
  batch_size: 1024
  gradient_clipping: 1.0
  mixed_precision: true
